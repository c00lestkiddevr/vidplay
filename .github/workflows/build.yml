name: Build 64-Bit MoviePlayer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Contents
        uses: actions/checkout@v4

      - name: Compile Native 64-Bit iOS Binary
        run: |
          # 1. Direct the environment toolchain to locate modern Apple SDK configurations
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # 2. Compile using target triplet identifiers to map the binary code layer to modern iOS targets
          xcrun -sdk iphoneos clang -Xarchive:arm64 -target arm64-apple-ios14.0 -fobjc-arc \
            -isysroot "$SDK_PATH" \
            -framework UIKit \
            -framework Foundation \
            -framework AVFoundation \
            -framework CoreMedia \
            -framework QuartzCore \
            main.m -o MoviePlayer

      - name: Assemble Sideload Payload Structure
        run: |
          rm -rf Payload
          mkdir -p Payload/MoviePlayer.app
          
          # Migrating executable binaries and schemas into the target bundle space
          mv MoviePlayer Payload/MoviePlayer.app/
          cp Info.plist Payload/MoviePlayer.app/
          cp Movie.m4v Payload/MoviePlayer.app/
          
          # Verify and copy assets safely if present in the workspace
          cp icon.png Payload/MoviePlayer.app/ 2>/dev/null || true
          cp local.png Payload/MoviePlayer.app/ 2>/dev/null || true
          cp streaming.png Payload/MoviePlayer.app/ 2>/dev/null || true
          cp preview.jpg Payload/MoviePlayer.app/ 2>/dev/null || true

      - name: Compress into Native IPA Format
        run: |
          zip -r MoviePlayer_64Bit.ipa Payload/

      - name: Upload Completed Package to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Modern_Pirates_Package
          path: MoviePlayer_64Bit.ipa
